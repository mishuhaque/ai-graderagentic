# Alembic Configuration File

sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

script_location = alembic

sqlalchemy.url =

version_path_separator = :

revision_file_template = %%(rev)s_%%(slug)s

file_template = %%(rev)s_%%(slug)s

compare_type = false
compare_server_default = false

include_schemas = false

include_object = null_include_object

include_views = false

render_as_batch = true

include_schemas = false

configure_logger = true
